<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>3D Print Quote - Complete Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f8f9fa; --text-main: #333333; --primary: #d44638; --accent: #0046ad; --card-bg: #ffffff; --border: #e0e0e0; }
        [data-theme="dark"] { --bg-main: #121212; --bg-sidebar: #1e1e1e; --text-main: #e0e0e0; --primary: #ff5252; --accent: #448aff; --card-bg: #2d2d2d; --border: #444444; }
        
        body { font-family: 'Kanit', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; }
        
        .sidebar { width: 360px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        .sidebar-content { padding: 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 220px; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 250px; border-radius: 10px; }

        .option-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: var(--primary); }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-main); font-family: inherit; }

        .upload-btn { display: block; background: #333; color: white; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }

        /* Detail Card */
        .detail-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; font-size: 0.85rem; margin-top: 10px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px dashed var(--border); padding-bottom: 4px; }

        /* Payment & Contact */
        .payment-box { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border); border-left: 5px solid var(--accent); margin-top: 15px; }
        .qr-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .contact-info { margin-top: 15px; padding: 10px; border-top: 1px solid var(--border); font-size: 0.8rem; line-height: 1.6; }

        /* Footer */
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg-sidebar); padding: 15px 20px; border-top: 1px solid var(--border); }
        .summary-box { background: #000; color: #fff; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        .price-value { font-size: 1.8rem; font-weight: 700; }
        .order-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        .theme-btn { position: absolute; top: 15px; right: 15px; z-index: 100; cursor: pointer; border: none; background: transparent; font-size: 1.2rem; }
        #render-area { flex-grow: 1; position: relative; }
        #qr-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:20px; border-radius:15px; text-align:center; color:#333; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>ชำระเงินผ่านพร้อมเพย์</h3>
            <img src="105446.jpg" alt="QR Code" style="width:280px; height:auto;" onerror="this.src='https://via.placeholder.com/280?text=Please+Upload+105446.jpg'">
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">กรุณาแนบสลิปหลังส่งข้อมูลทาง Gmail</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-content">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=3D+PRINT+SHOP'">
            </div>
            
            <label class="upload-btn">📂 เลือกไฟล์ STL <input type="file" id="file-input" accept=".stl" style="display:none"></label>

            <div class="option-group">
                <label>1. วัสดุ (Material)</label>
               <select id="material" onchange="updateMaterialUI()">
    <option value="pla_pro">PLA Pro สวยเนียน • พิมพ์ง่าย • ตั้งโชว์</option>
    <option value="petg_hf">PETG HF เหนียว • ทนแดด • ของใช้ทั่วไป </option>
    <option value="petg">PETG เหนียว • ทน </option> <option value="abs">ABS ถึก • ทนร้อน • งานวิศวกรรม</option>
</select>
                <div id="color-palette" style="display:flex; gap:8px; margin-top:10px;"></div>
            </div>

            <div class="option-group">
                <label>2. ความหนาแน่น (Infill)</label>
                <select id="infill" onchange="updatePrice()">
                    <option value="0.15">15% (ประหยัด)</option>
                    <option value="0.30">30% (มาตรฐาน)</option>
                    <option value="0.50">50% (แข็งแรง)</option>
                    <option value="0.75">75% (แข็งแรงมาก)</option>
                    <option value="1.00">100% (เนื้อตัน)</option>
                </select>
            </div>

            <div class="option-group">
                <label>3. อีเมลของคุณ</label>
                <input type="email" id="user-email" placeholder="customer@example.com">
            </div>

            <div class="detail-card">
                <div class="detail-row"><span>ไฟล์:</span><span id="bd-name">-</span></div>
                <div class="detail-row"><span>ขนาด (mm):</span><span id="bd-size">-</span></div>
                <div class="detail-row"><span>น้ำหนัก:</span><span id="bd-weight">0.0 g</span></div>
                <div class="detail-row"><span>Setup:</span><span>50.00 ฿</span></div>
            </div>

            <div class="payment-box">
                <strong>💰 พร้อมเพย์</strong><br>
                ธนาคาร: ไทยพาณิชย์ (SCB)<br>
                เลขบัญชี: 2212444042<br>
                <button class="qr-btn" onclick="document.getElementById('qr-modal').style.display='flex'">📸 ดู QR Code จ่ายเงิน</button>
            </div>

            <div class="contact-info">
                <strong>📍 ติดต่อสอบถามเพิ่มเติม:</strong><br>
                📞 โทร: 089-777-3889<br>
                🆔 LINE: varis22521<br>
                🌐 FB: Avalonrobotics
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="summary-box">
                <div style="font-size:0.7rem; opacity:0.8;">ราคาสุทธิประเมิน (ไม่รวมส่ง)</div>
                <div class="price-value">฿ <span id="val-price">0.00</span></div>
            </div>
            <button class="order-btn" onclick="processOrder()">📧 ส่งข้อมูลทาง Gmail</button>
        </div>
    </div>

    <div id="render-area"></div>

    <script>
        const MY_CONFIG = {
    shopEmail: "YOUREMAIL@gmail.com", 
    setupFee: 50,
    materials: {
        pla_pro: { 
            name: "PLA Pro ฟิกเกอร์, ของเล่น, ชิ้นงานต้นแบบ", 
            price: 3.5, 
            density: 1.25, 
            colors: ["#111111"] 
        },
        petg_hf: { 
            name: "PETG HF สีส้ม (เหนียว ทน วิศวกรรม)", 
            price: 3.2, 
            density: 1.25, 
            colors: ["#ff9800"] 
        },
        petg: { 
            name: "PETG มาตรฐาน (เหนียว ทน วิศวกรรม)", 
            price: 3.0, 
            density: 1.25, 
            colors: ["#3498db","#00cc00","#b266ff","#ff0000"] 
        },
        abs: { 
            name: "ABS/ASA งานวิศวกรรม ทนร้อน", 
            price: 4.0, 
            density: 1.07, 
            colors: ["#ff9800"] 
        }
    }
};
        let scene, camera, renderer, controls, mesh, grid, modelVol = 0, currentFileName = "", selectedColor = "", modelDim = "";

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 0.1, 10000);
            camera.position.set(250, 250, 250);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 360, window.innerHeight);
            document.getElementById('render-area').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            grid = new THREE.GridHelper(500, 50, 0x888888, 0xdddddd);
            scene.add(grid);
            updateMaterialUI();
            animate();
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            scene.background = new THREE.Color(isDark ? 0xffffff : 0x121212);
            grid.material.color.set(isDark ? 0x888888 : 0x444444);
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            currentFileName = file.name;
            document.getElementById('bd-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                const geometry = new THREE.STLLoader().parse(event.target.result);
                if (mesh) scene.remove(mesh);
                mesh = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: selectedColor }));
                geometry.computeBoundingBox(); geometry.center();
                const size = new THREE.Vector3(); geometry.boundingBox.getSize(size);
                modelDim = `${size.x.toFixed(1)}x${size.y.toFixed(1)}x${size.z.toFixed(1)}`;
                document.getElementById('bd-size').innerText = modelDim;
                scene.add(mesh);
                modelVol = calculateVolume(geometry) / 1000;
                updatePrice();
            };
            reader.readAsArrayBuffer(file);
        });

        function calculateVolume(geometry) {
            let vol = 0; const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i += 3) {
                const v1 = new THREE.Vector3().fromBufferAttribute(pos, i), v2 = new THREE.Vector3().fromBufferAttribute(pos, i+1), v3 = new THREE.Vector3().fromBufferAttribute(pos, i+2);
                vol += v1.dot(v2.cross(v3)) / 6.0;
            }
            return Math.abs(vol);
        }

        function updateMaterialUI() {
            const matKey = document.getElementById('material').value;
            const mat = MY_CONFIG.materials[matKey];
            const palette = document.getElementById('color-palette');
            palette.innerHTML = "";
            mat.colors.forEach((hex, i) => {
                let dot = document.createElement('div');
                dot.style.width = '30px'; dot.style.height = '30px'; dot.style.borderRadius = '50%';
                dot.style.backgroundColor = hex; dot.style.cursor = 'pointer';
                dot.style.border = (selectedColor === hex) ? '3px solid #ff4d4d' : '1px solid #ccc';
                dot.onclick = () => { selectedColor = hex; if(mesh) mesh.material.color.set(hex); updateMaterialUI(); };
                palette.appendChild(dot);
                if(i === 0 && !selectedColor) selectedColor = hex;
            });
            updatePrice();
        }

        function updatePrice() {
            const matKey = document.getElementById('material').value;
            const mat = MY_CONFIG.materials[matKey];
            const infill = parseFloat(document.getElementById('infill').value);
            const weight = modelVol * mat.density * (infill * 0.9 + 0.1);
            let total = (weight * mat.price) + MY_CONFIG.setupFee;
            document.getElementById('bd-weight').innerText = weight.toFixed(1) + " g";
            document.getElementById('val-price').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function processOrder() {
            const userEmail = document.getElementById('user-email').value;
            if(currentFileName === "" || userEmail === "") { alert("กรุณาอัปโหลดไฟล์และใส่อีเมลของคุณก่อนครับ"); return; }
            const infillText = document.getElementById('infill').options[document.getElementById('infill').selectedIndex].text;
            const price = document.getElementById('val-price').innerText;
            const matName = MY_CONFIG.materials[document.getElementById('material').value].name;
            const details = `ยืนยันออเดอร์ใหม่!\n---\nไฟล์: ${currentFileName}\nขนาด: ${modelDim} mm\nวัสดุ: ${matName}\nInfill: ${infillText}\nราคาประเมิน: ฿${price}\nเมลติดต่อลูกค้า: ${userEmail}\n---\n⚠️*อย่าลืมแนบไฟล์ STL และสลิปโอนเงินมาในเมลนี้ด้วยนะครับ*⚠️`;
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${MY_CONFIG.shopEmail}&su=สั่งปริ้น3D-${currentFileName}&body=${encodeURIComponent(details)}`, '_blank');
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
